test_suite_config:
  files:
    - path: ${TORCH_ROOT}/test/test_binary_ufuncs.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestBinaryUfuncs::test_scalar_support
            - TestBinaryUfuncs::test_contig_vs_transposed
          mode: xfail
          tags:
            - model_1
            - model_2
          edits:
            ops:
              include:
                - name: add
                  description: inject add — binary_ufuncs_with_references excludes it if ref is None
              exclude:
                - name: gcd
                  description: gcd causes buffer alignment errors for this test
            dtypes:
              include:
                - name: float32
        - names: # All the below tests are generated by stand-alone method generate_not_implemented_tests() in https://github.com/pytorch/pytorch/blob/f0780d09b032ff34956cc10ac57d218f45b86659/test/test_binary_ufuncs.py#L4653. It tests binary math operations return NotImplemented for unknown types.
            - TestBinaryUfuncs::test___and___not_implemented
            - TestBinaryUfuncs::test___eq___not_implemented
            - TestBinaryUfuncs::test___floordiv___not_implemented
            - TestBinaryUfuncs::test___ge___not_implemented
            - TestBinaryUfuncs::test___gt___not_implemented
            - TestBinaryUfuncs::test___iadd___not_implemented
            - TestBinaryUfuncs::test___iand___not_implemented
            - TestBinaryUfuncs::test___ifloordiv___not_implemented
            - TestBinaryUfuncs::test___ilshift___not_implemented
            - TestBinaryUfuncs::test___imod___not_implemented
            - TestBinaryUfuncs::test___imul___not_implemented
            - TestBinaryUfuncs::test___ior___not_implemented
            - TestBinaryUfuncs::test___ipow___not_implemented
            - TestBinaryUfuncs::test___irshift___not_implemented
            - TestBinaryUfuncs::test___isub___not_implemented
            - TestBinaryUfuncs::test___itruediv___not_implemented
            - TestBinaryUfuncs::test___ixor___not_implemented
            - TestBinaryUfuncs::test___le___not_implemented
            - TestBinaryUfuncs::test___lshift___not_implemented
            - TestBinaryUfuncs::test___lt___not_implemented
            - TestBinaryUfuncs::test___matmul___not_implemented
            - TestBinaryUfuncs::test___mod___not_implemented
            - TestBinaryUfuncs::test___mul___not_implemented
            - TestBinaryUfuncs::test___ne___not_implemented
            - TestBinaryUfuncs::test___or___not_implemented
            - TestBinaryUfuncs::test___pow___not_implemented
            - TestBinaryUfuncs::test___radd___not_implemented
            - TestBinaryUfuncs::test___rand___not_implemented
            - TestBinaryUfuncs::test___rfloordiv___not_implemented
            - TestBinaryUfuncs::test___rlshift___not_implemented
            - TestBinaryUfuncs::test___rmatmul___not_implemented
            - TestBinaryUfuncs::test___rmod___not_implemented
            - TestBinaryUfuncs::test___rmul___not_implemented
            - TestBinaryUfuncs::test___ror___not_implemented
            - TestBinaryUfuncs::test___rpow___not_implemented
            - TestBinaryUfuncs::test___rrshift___not_implemented
            - TestBinaryUfuncs::test___rshift___not_implemented
            - TestBinaryUfuncs::test___rsub___not_implemented
            - TestBinaryUfuncs::test___rxor___not_implemented
            - TestBinaryUfuncs::test___sub___not_implemented
            - TestBinaryUfuncs::test___truediv___not_implemented
            - TestBinaryUfuncs::test___xor___not_implemented
          mode: mandatory_success
          edits:
            dtypes:
              exclude:
                - name: float64
                  description: float64 unsupported on Spyre for this test.
        - names:
            - TestBinaryUfuncs::test_binary_op_mem_overlap # The test iterates over a list of binary PyTorch operations, exercising both their out-of-place and in‑place variants on a given device and dtype, and verifies that the implementations correctly detect and handle internal and input‑output memory overlap. For Spyre, some code refactoring is required. At the moment, the test seems to default to cpu.
          mode: mandatory_success
          edits:
            dtypes:
              include:
                - name: float64
                  description: Since, this test runs on cpu, the float64 works. When the test is extended to Spyre, then this dtype might have to be modified
                    as float64 is unsupported on Spyre.
        - names:
            - TestBinaryUfuncs::test_divide_by_zero_rounding # The test verifies that torch.divide correctly handles division by zero for various floating‑point dtypes, comparing its output to NumPy's np.divide for both scalar and tensor zero divisors and for different rounding modes. For Spyre, some code refactoring is required. At the moment, the test seems to default to cpu.
          mode: mandatory_success
          edits:
            dtypes:
              include:
                - name: bfloat16
                  description: Supported by both Spyre and CPU. Required floating point dtype for the test.
                - name: float16
                  description: Supported by both Spyre and CPU. Required floating point dtype for the test.
                - name: float32
                  description: Supported by both Spyre and CPU. Required floating point dtype for the test.
                - name: float64
                  description: Since, this test runs on cpu, the float64 works. When the test is extended to Spyre, then this dtype might have to be modified
                    as float64 is unsupported on Spyre.

  global:
    supported_dtypes:
      - name: float16
      - name: int64
    supported_ops:
      - name: add
        dtypes:
          - name: float16
            precision:
              atol: 1e-3
              rtol: 1e-3
          - name: int64
      - name: mul
      - name: sub
      - name: gcd
        force_xfail: true
    supported_modules:
      - name: torch.nn.Linear
      - name: torch.nn.Conv2d
      - name: torch.nn.ReLU
        force_xfail: true
