<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" font-family="sans-serif" font-size="12">
  <rect width="920" height="720" fill="white"/>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="ahbig" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
    <pattern id="padHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#fee2e2"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#f87171" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">From PyTorch shape to Spyre device shape</text>
  <text x="460" y="48" text-anchor="middle" font-size="11" fill="#475569">tensor.to("spyre"): the same data, viewed two ways</text>

  <!-- ========================= LEFT: LOGICAL VIEW ========================= -->
  <text x="190" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">What PyTorch sees</text>
  <text x="190" y="104" text-anchor="middle" font-size="10" fill="#64748b">a 3D tensor of size [50, 10, 200]</text>

  <g stroke="#1e3a8a" stroke-width="1.4" fill="#dbeafe">
    <polygon points="90,150 290,150 290,260 90,260" />
    <polygon points="90,150 130,118 330,118 290,150" fill="#bfdbfe"/>
    <polygon points="290,150 330,118 330,228 290,260" fill="#93c5fd"/>
  </g>
  <text x="190" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a8a">N = 200</text>
  <text x="78" y="210" text-anchor="end" font-size="11" font-weight="bold" fill="#1e3a8a">M = 50</text>
  <text x="345" y="135" text-anchor="start" font-size="11" font-weight="bold" fill="#1e3a8a">P = 10</text>

  <!-- ========================= MIDDLE: PAD + TILE ARROW ========================= -->
  <rect x="395" y="158" width="120" height="32" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="455" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Pad + Tile</text>
  <line x1="395" y1="215" x2="510" y2="215" stroke="#f59e0b" stroke-width="3.5" marker-end="url(#ahbig)"/>
  <text x="455" y="248" text-anchor="middle" font-size="10" font-style="italic" fill="#92400e">128-byte sticks,</text>
  <text x="455" y="262" text-anchor="middle" font-size="10" font-style="italic" fill="#92400e">tile-major order</text>

  <!-- ========================= RIGHT: PHYSICAL VIEW ========================= -->
  <text x="730" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">What Spyre stores</text>
  <text x="730" y="104" text-anchor="middle" font-size="10" fill="#64748b">device_size [10, 4, 50, 64]</text>

  <text x="730" y="130" text-anchor="middle" font-size="10" fill="#14532d">drawn for a single P-index (one out of 10)</text>

  <!-- Outer slice rectangle widened to allow extra gap before tile 3 split -->
  <g stroke="#166534" stroke-width="1.4">
    <rect x="555" y="142" width="365" height="135" fill="#dcfce7"/>
  </g>

  <!-- Tiles 0-2 -->
  <g stroke="#166534" stroke-width="1.2">
    <rect x="565" y="154" width="73" height="113" fill="#bbf7d0"/>
    <rect x="648" y="154" width="73" height="113" fill="#bbf7d0"/>
    <rect x="731" y="154" width="73" height="113" fill="#bbf7d0"/>
  </g>

  <!-- Tile 3: 8 valid + visible gap + 56 padded -->
  <g stroke="#166534" stroke-width="1.2">
    <rect x="814" y="154" width="14" height="113" fill="#bbf7d0"/>
  </g>
  <g stroke="#dc2626" stroke-width="1.2">
    <rect x="848" y="154" width="62" height="113" fill="url(#padHatch)"/>
  </g>

  <!-- Tile labels: stick tile 0 / 1 / 2 / 3 all written inside their boxes, same style -->
  <text x="601" y="206" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">stick</text>
  <text x="601" y="218" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">tile 0</text>
  <text x="684" y="206" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">stick</text>
  <text x="684" y="218" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">tile 1</text>
  <text x="767" y="206" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">stick</text>
  <text x="767" y="218" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">tile 2</text>
  <text x="879" y="206" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">stick</text>
  <text x="879" y="218" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">tile 3</text>

  <!-- Row stripes inside tile 0 -->
  <g stroke="#14532d" stroke-width="0.5" stroke-opacity="0.45">
    <line x1="565" y1="160" x2="638" y2="160"/>
    <line x1="565" y1="165" x2="638" y2="165"/>
    <line x1="565" y1="170" x2="638" y2="170"/>
    <line x1="565" y1="175" x2="638" y2="175"/>
    <line x1="565" y1="180" x2="638" y2="180"/>
    <line x1="565" y1="185" x2="638" y2="185"/>
    <line x1="565" y1="190" x2="638" y2="190"/>
    <line x1="565" y1="195" x2="638" y2="195"/>
    <line x1="565" y1="231" x2="638" y2="231"/>
    <line x1="565" y1="236" x2="638" y2="236"/>
    <line x1="565" y1="241" x2="638" y2="241"/>
    <line x1="565" y1="246" x2="638" y2="246"/>
    <line x1="565" y1="251" x2="638" y2="251"/>
    <line x1="565" y1="256" x2="638" y2="256"/>
    <line x1="565" y1="261" x2="638" y2="261"/>
  </g>

  <!-- Annotations BELOW the slab pointing to the two halves of tile 3 -->
  <line x1="821" y1="290" x2="821" y2="270" stroke="#166534" stroke-width="1.2" marker-end="url(#ah)"/>
  <text x="821" y="306" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">8 valid</text>

  <line x1="879" y1="290" x2="879" y2="270" stroke="#dc2626" stroke-width="1.2" marker-end="url(#ah)"/>
  <text x="879" y="306" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">56 padded</text>

  <text x="601" y="290" text-anchor="middle" font-size="9" font-style="italic" fill="#14532d">faint lines = M = 50 rows stacked vertically</text>
  <text x="730" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">N = 200 split into 4 tiles × 64-element sticks</text>

  <!-- ========================= MIDDLE BAND: SHAPE ROWS ========================= -->
  <text x="120" y="378" text-anchor="end" font-size="11" font-weight="bold" fill="#0f172a">size</text>
  <g font-size="13" font-weight="bold" fill="white">
    <rect x="140" y="360" width="80" height="34" rx="6" fill="#9333ea"/>
    <text x="180" y="382" text-anchor="middle">50</text>
    <rect x="230" y="360" width="80" height="34" rx="6" fill="#0ea5e9"/>
    <text x="270" y="382" text-anchor="middle">10</text>
    <rect x="320" y="360" width="80" height="34" rx="6" fill="#1e3a8a"/>
    <text x="360" y="382" text-anchor="middle">200</text>
  </g>
  <text x="415" y="381" font-size="10" font-style="italic" fill="#64748b">PyTorch logical shape</text>

  <line x1="180" y1="396" x2="360" y2="438" stroke="#9333ea" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="270" y1="396" x2="180" y2="438" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="360" y1="396" x2="270" y2="438" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="360" y1="396" x2="450" y2="438" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#ah)"/>

  <text x="120" y="458" text-anchor="end" font-size="11" font-weight="bold" fill="#0f172a">device_size</text>
  <g font-size="13" font-weight="bold" fill="white">
    <rect x="140" y="440" width="80" height="34" rx="6" fill="#0ea5e9"/>
    <text x="180" y="462" text-anchor="middle">10</text>
    <rect x="230" y="440" width="80" height="34" rx="6" fill="#1e3a8a"/>
    <text x="270" y="462" text-anchor="middle">4</text>
    <rect x="320" y="440" width="80" height="34" rx="6" fill="#9333ea"/>
    <text x="360" y="462" text-anchor="middle">50</text>
    <rect x="410" y="440" width="80" height="34" rx="6" fill="#1e3a8a"/>
    <text x="450" y="462" text-anchor="middle">64</text>
  </g>
  <text x="505" y="461" font-size="10" font-style="italic" fill="#64748b">Spyre device shape (tile dim + stick dim added)</text>

  <text x="180" y="489" text-anchor="middle" font-size="9" font-style="italic" fill="#475569">P</text>
  <text x="270" y="489" text-anchor="middle" font-size="9" font-style="italic" fill="#475569">tile</text>
  <text x="360" y="489" text-anchor="middle" font-size="9" font-style="italic" fill="#475569">M (row)</text>
  <text x="450" y="489" text-anchor="middle" font-size="9" font-style="italic" fill="#475569">within stick</text>

  <!-- stride_map row -->
  <text x="120" y="522" text-anchor="end" font-size="11" font-weight="bold" fill="#0f172a">stride_map</text>
  <g font-size="13" font-weight="bold" fill="#0f172a">
    <rect x="140" y="504" width="80" height="34" rx="6" fill="#e0e7ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="180" y="526" text-anchor="middle">200</text>
    <rect x="230" y="504" width="80" height="34" rx="6" fill="#e0e7ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="270" y="526" text-anchor="middle">64</text>
    <rect x="320" y="504" width="80" height="34" rx="6" fill="#e0e7ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="360" y="526" text-anchor="middle">2000</text>
    <rect x="410" y="504" width="80" height="34" rx="6" fill="#e0e7ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="450" y="526" text-anchor="middle">1</text>
  </g>
  <text x="505" y="523" font-size="10" font-style="italic" fill="#64748b">host elements per +1 step</text>

  <g font-size="9" fill="#475569">
    <text x="180" y="554" text-anchor="middle">+1 step in P</text>
    <text x="180" y="566" text-anchor="middle">→ +200 elems</text>
    <text x="270" y="554" text-anchor="middle">+1 step in tile</text>
    <text x="270" y="566" text-anchor="middle">→ +64 (one stick)</text>
    <text x="360" y="554" text-anchor="middle">+1 step in M</text>
    <text x="360" y="566" text-anchor="middle">→ +2000 elems</text>
    <text x="450" y="554" text-anchor="middle">+1 within stick</text>
    <text x="450" y="566" text-anchor="middle">→ +1 elem</text>
  </g>

  <!-- ========================= BOTTOM: IDENTITY ========================= -->
  <rect x="40" y="598" width="840" height="100" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>

  <text x="460" y="622" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">One identity ties the two views together</text>
  <line x1="60" y1="632" x2="860" y2="632" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="654" font-size="11" fill="#0f172a"><tspan font-weight="bold">PyTorch:</tspan>  offset = dot(coordinates, stride)        <tspan fill="#475569">stride = [2000, 200, 1]</tspan></text>
  <text x="60" y="678" font-size="13" font-weight="bold" fill="#1e3a8a">offset = dot(device_coordinates, stride_map)</text>
  <text x="430" y="678" font-size="10" font-style="italic" fill="#64748b">walk the device shape, land on the right host element</text>
</svg>
