<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 880" font-family="sans-serif" font-size="12">
  <rect width="980" height="880" fill="white"/>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="ahbig" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <text x="490" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">From a shared Inductor index to per-tensor device coordinates</text>
  <text x="490" y="48" text-anchor="middle" font-size="11" fill="#475569">a worked example showing how two differently-shaped tensors line up under one iteration space</text>

  <!-- ========================= TOP: source program ========================= -->
  <rect x="40" y="68" width="900" height="135" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.2"/>
  <text x="60" y="89" font-size="11" font-weight="bold" fill="#0f172a">The program (run with torch.compile, backend="spyre"):</text>
  <text x="60" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#0f172a">x = torch.rand(50, 10, 200, dtype=torch.float16)   <tspan fill="#475569"># a 3-D tensor</tspan></text>
  <text x="60" y="126" font-family="ui-monospace, monospace" font-size="11" fill="#0f172a">y = torch.rand(500, 200,   dtype=torch.float16)    <tspan fill="#475569"># a 2-D tensor</tspan></text>
  <text x="60" y="148" font-family="ui-monospace, monospace" font-size="11" fill="#0f172a">def f(x, y):</text>
  <text x="60" y="164" font-family="ui-monospace, monospace" font-size="11" fill="#0f172a">    return x.flatten(0, 1) + y       <tspan fill="#475569"># flatten makes x's first two dims (50×10) into one of size 500</tspan></text>
  <text x="60" y="186" font-size="10" font-style="italic" fill="#475569">x and y start out with different shapes; flatten reshapes x to [500, 200] so it can be added element-wise to y.</text>

  <!-- ========================= STEP 0: Inductor index ========================= -->
  <rect x="40" y="215" width="900" height="60" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="60" y="235" font-size="11" font-weight="bold" fill="#854d0e">Inductor body after lowering (the flatten and the add are folded into one linear index):</text>
  <text x="60" y="256" font-family="ui-monospace, monospace" font-size="11" fill="#0f172a">var_ranges = {p0: 500, p1: 200}    index0 = 200 * p0 + p1   <tspan fill="#475569"># both tensors share index0</tspan></text>

  <!-- ========================= STEP 1 ========================= -->
  <text x="490" y="304" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Step 1 — lift index0 into per-tensor device coordinates</text>
  <text x="490" y="322" text-anchor="middle" font-size="10" fill="#475569">iteration space {p: 500, s: 200} from index0 = 200·p + s</text>

  <!-- ===== x panel ===== -->
  <rect x="40" y="339" width="450" height="180" rx="8" fill="#eff6ff" stroke="#1e40af" stroke-width="1.2"/>
  <text x="55" y="360" font-size="12" font-weight="bold" fill="#1e3a8a">x: PyTorch [50, 10, 200] → device_size [10, 4, 50, 64]</text>

  <g stroke="#166534" stroke-width="1">
    <rect x="55" y="376" width="180" height="120" fill="#dcfce7"/>
    <rect x="60" y="384" width="40" height="104" fill="#bbf7d0"/>
    <rect x="100" y="384" width="40" height="104" fill="#bbf7d0"/>
    <rect x="140" y="384" width="40" height="104" fill="#bbf7d0"/>
    <rect x="180" y="384" width="40" height="104" fill="#bbf7d0"/>
  </g>
  <text x="80" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#166534">tile 0</text>
  <text x="120" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#166534">tile 1</text>
  <text x="160" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#166534">tile 2</text>
  <text x="200" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#166534">tile 3</text>
  <g stroke="#14532d" stroke-width="0.4" stroke-opacity="0.4">
    <line x1="60" y1="392" x2="100" y2="392"/>
    <line x1="60" y1="400" x2="100" y2="400"/>
    <line x1="60" y1="408" x2="100" y2="408"/>
    <line x1="60" y1="416" x2="100" y2="416"/>
    <line x1="60" y1="424" x2="100" y2="424"/>
    <line x1="60" y1="456" x2="100" y2="456"/>
    <line x1="60" y1="464" x2="100" y2="464"/>
    <line x1="60" y1="472" x2="100" y2="472"/>
    <line x1="60" y1="480" x2="100" y2="480"/>
  </g>
  <text x="50" y="439" text-anchor="end" font-size="9" font-weight="bold" fill="#14532d" transform="rotate(-90 50 439)">M = 50 rows</text>
  <text x="140" y="512" text-anchor="middle" font-size="9" fill="#475569">one of P = 10 outer slices</text>

  <text x="245" y="396" font-size="11" font-weight="bold" fill="#1e3a8a">x.device_coords =</text>
  <text x="245" y="420" font-family="ui-monospace, monospace" font-size="11" fill="#0f172a">[ p % 10,  s // 64,  p // 10,  s % 64 ]</text>
  <text x="263" y="438" text-anchor="middle" font-size="8" font-style="italic" fill="#1e40af">P</text>
  <text x="316" y="438" text-anchor="middle" font-size="8" font-style="italic" fill="#1e40af">tile</text>
  <text x="370" y="438" text-anchor="middle" font-size="8" font-style="italic" fill="#1e40af">M</text>
  <text x="430" y="438" text-anchor="middle" font-size="8" font-style="italic" fill="#1e40af">stick</text>
  <text x="245" y="464" font-size="10" fill="#475569">flatten was over (50, 10), so</text>
  <text x="245" y="478" font-size="10" fill="#475569">p splits as (p % 10, p // 10)</text>

  <!-- ===== y panel ===== -->
  <rect x="510" y="339" width="430" height="180" rx="8" fill="#fdf2f8" stroke="#9f1239" stroke-width="1.2"/>
  <text x="525" y="360" font-size="12" font-weight="bold" fill="#9f1239">y: PyTorch [500, 200] → device_size [4, 500, 64]</text>

  <g stroke="#9f1239" stroke-width="1">
    <rect x="525" y="376" width="180" height="120" fill="#fce7f3"/>
    <rect x="530" y="384" width="40" height="104" fill="#fbcfe8"/>
    <rect x="570" y="384" width="40" height="104" fill="#fbcfe8"/>
    <rect x="610" y="384" width="40" height="104" fill="#fbcfe8"/>
    <rect x="650" y="384" width="40" height="104" fill="#fbcfe8"/>
  </g>
  <text x="550" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#9f1239">tile 0</text>
  <text x="590" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#9f1239">tile 1</text>
  <text x="630" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#9f1239">tile 2</text>
  <text x="670" y="438" text-anchor="middle" font-size="7" font-weight="bold" fill="#9f1239">tile 3</text>
  <g stroke="#9f1239" stroke-width="0.3" stroke-opacity="0.4">
    <line x1="530" y1="390" x2="570" y2="390"/>
    <line x1="530" y1="396" x2="570" y2="396"/>
    <line x1="530" y1="402" x2="570" y2="402"/>
    <line x1="530" y1="408" x2="570" y2="408"/>
    <line x1="530" y1="414" x2="570" y2="414"/>
    <line x1="530" y1="420" x2="570" y2="420"/>
    <line x1="530" y1="426" x2="570" y2="426"/>
    <line x1="530" y1="456" x2="570" y2="456"/>
    <line x1="530" y1="462" x2="570" y2="462"/>
    <line x1="530" y1="468" x2="570" y2="468"/>
    <line x1="530" y1="474" x2="570" y2="474"/>
    <line x1="530" y1="480" x2="570" y2="480"/>
  </g>
  <text x="520" y="439" text-anchor="end" font-size="9" font-weight="bold" fill="#9f1239" transform="rotate(-90 520 439)">500 flat rows</text>
  <text x="615" y="512" text-anchor="middle" font-size="9" fill="#475569">y is rank-2; no outer slice dim</text>

  <text x="710" y="396" font-size="11" font-weight="bold" fill="#9f1239">y.device_coords =</text>
  <text x="710" y="420" font-family="ui-monospace, monospace" font-size="11" fill="#0f172a">[ s // 64,  p,  s % 64 ]</text>
  <text x="725" y="438" text-anchor="middle" font-size="8" font-style="italic" fill="#9f1239">tile</text>
  <text x="775" y="438" text-anchor="middle" font-size="8" font-style="italic" fill="#9f1239">row</text>
  <text x="820" y="438" text-anchor="middle" font-size="8" font-style="italic" fill="#9f1239">stick</text>
  <text x="710" y="464" font-size="10" fill="#475569">y is rank-2 in PyTorch, so p</text>
  <text x="710" y="478" font-size="10" fill="#475569">stays as a single row index</text>

  <!-- Down arrow -->
  <line x1="490" y1="532" x2="490" y2="570" stroke="#475569" stroke-width="2.5" marker-end="url(#ahbig)"/>
  <text x="510" y="554" font-size="10" font-style="italic" fill="#475569">co-simplify the iteration space so the divisions and modulos disappear</text>

  <!-- ========================= STEP 2 ========================= -->
  <text x="490" y="598" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Step 2 — co-simplify: factor p into (q, p) with q = p // 10, p = p % 10</text>
  <text x="490" y="616" text-anchor="middle" font-size="10" fill="#475569">simplified iteration space {p: 10, q: 50, s: 200}</text>

  <rect x="40" y="632" width="450" height="80" rx="8" fill="#eff6ff" stroke="#1e40af" stroke-width="1.2"/>
  <text x="55" y="652" font-size="12" font-weight="bold" fill="#1e3a8a">x.device_coords (simplified):</text>
  <text x="55" y="678" font-family="ui-monospace, monospace" font-size="13" font-weight="bold" fill="#0f172a">[ p,    s // 64,    q,    s % 64 ]</text>
  <text x="93" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#1e40af">P</text>
  <text x="180" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#1e40af">tile</text>
  <text x="250" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#1e40af">M</text>
  <text x="335" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#1e40af">stick</text>

  <rect x="510" y="632" width="430" height="80" rx="8" fill="#fdf2f8" stroke="#9f1239" stroke-width="1.2"/>
  <text x="525" y="652" font-size="12" font-weight="bold" fill="#9f1239">y.device_coords (simplified):</text>
  <text x="525" y="678" font-family="ui-monospace, monospace" font-size="13" font-weight="bold" fill="#0f172a">[ s // 64,    q,    p,    s % 64 ]</text>
  <text x="565" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#9f1239">tile</text>
  <text x="660" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#9f1239">row hi (q)</text>
  <text x="725" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#9f1239">row lo (p)</text>
  <text x="800" y="698" text-anchor="middle" font-size="9" font-style="italic" fill="#9f1239">stick</text>

  <!-- ========================= TAKEAWAY ========================= -->
  <rect x="40" y="732" width="900" height="135" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="490" y="754" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">What this buys us</text>
  <line x1="60" y1="764" x2="920" y2="764" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="786" font-size="11" fill="#0f172a">• Both tensors index off the same iteration variables (<tspan font-family="ui-monospace, monospace">p, q, s</tspan>), so a single kernel reads x and y consistently.</text>
  <text x="60" y="810" font-size="11" fill="#0f172a">• Each tensor still gets its own dim order; SuperDSC <tspan font-family="ui-monospace, monospace">layoutDimOrder_</tspan> is per-argument so this is not a problem.</text>
  <text x="60" y="834" font-size="11" fill="#0f172a">• The integer divisions and modulos collapse out of the inner loop and become loop variables, not runtime arithmetic.</text>
  <text x="60" y="858" font-size="11" fill="#0f172a">• No materializing copy is needed for <tspan font-family="ui-monospace, monospace">x.flatten(0, 1)</tspan>; the flatten lives entirely in the shape of each tensor's coordinate vector.</text>
</svg>
